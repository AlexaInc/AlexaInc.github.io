name: Update Bot Status

on:
  schedule:
    - cron: '*/15 * * * *' # Runs every 15 minutes
  workflow_dispatch: # Allows manual trigger

jobs:
  update-status:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Create data directory
        run: mkdir -p data

      - name: Fetch WhatsApp (Koyeb) Status
        run: |
          STATUS_JSON=$(curl -s "https://alexaincsl-alexa.hf.space/status" || echo "{}")
          PHONE_JSON=$(curl -s "https://alexaincsl-alexa.hf.space/get-phone-number" || echo "{}")
          
          # Use jq to extract values or set defaults, handle invalid JSON by defaulting
          WA_STATUS=$(echo "$STATUS_JSON" | jq -r '.status // "OFFLINE"' 2>/dev/null || echo "OFFLINE")
          WA_PHONE=$(echo "$PHONE_JSON" | jq -r '.phoneNumber // "94705327164"' 2>/dev/null || echo "94705327164")
          
          if [ "$WA_STATUS" == "ONLINE" ]; then
            WA_UPDATE="System: Active & Responsive"
          else
            WA_UPDATE="System: Offline / Starting"
          fi

          echo "WA_STATUS=$WA_STATUS" >> $GITHUB_ENV
          echo "WA_PHONE=$WA_PHONE" >> $GITHUB_ENV
          echo "WA_UPDATE=$WA_UPDATE" >> $GITHUB_ENV

      - name: Fetch AlexaTG Status
        run: |
          RESPONSE=$(curl -s "https://alexatgsl-alexatg.hf.space/" \
            -H "accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,image/apng,*/*;q=0.8,application/signed-exchange;v=b3;q=0.7" \
            -H "accept-language: en-GB,en-US;q=0.9,en;q=0.8" \
            -H "cache-control: max-age=0" \
            -H "priority: u=0, i" \
            -H 'sec-ch-ua: "Not=A?Brand";v="24", "Chromium";v="140"' \
            -H "sec-ch-ua-mobile: ?0" \
            -H 'sec-ch-ua-platform: "Windows"' \
            -H "sec-fetch-dest: document" \
            -H "sec-fetch-mode: navigate" \
            -H "sec-fetch-site: none" \
            -H "sec-fetch-user: ?1" \
            -H "upgrade-insecure-requests: 1" || echo "offline")
          
          if echo "$RESPONSE" | grep -qi "alive"; then
            STATUS="ONLINE"
            UPDATE="System: Active & Responsive"
          else
            STATUS="OFFLINE"
            UPDATE="System: Offline / Starting"
          fi
          echo "TG_STATUS=$STATUS" >> $GITHUB_ENV
          echo "TG_UPDATE=$UPDATE" >> $GITHUB_ENV

      - name: Fetch Snowstrom Status
