<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A855F7"/>
      <stop offset="50%" stop-color="#EC4899"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#g)"/>
  <!-- vinyl disc -->
  <g transform="translate(256 220)">
    <circle r="96" fill="black" opacity="0.85"/>
    <circle r="88" fill="none" stroke="white" stroke-opacity="0.15" stroke-width="1.5"/>
    <circle r="72" fill="none" stroke="white" stroke-opacity="0.1" stroke-width="1"/>
    <circle r="56" fill="none" stroke="white" stroke-opacity="0.1" stroke-width="1"/>
    <circle r="18" fill="#EC4899" stroke="black" stroke-width="3"/>
    <circle r="6" fill="white"/>
    <!-- music note floating -->
    <g transform="translate(56 -64) rotate(12)">
      <circle cx="0" cy="16" r="14" fill="white"/>
      <circle cx="24" cy="20" r="14" fill="white"/>
      <rect x="11" y="-18" width="6" height="34" fill="white"/>
      <rect x="35" y="-14" width="6" height="34" fill="white"/>
      <rect x="11" y="-18" width="30" height="6" fill="white"/>
    </g>
  </g>
  <!-- waveform -->
  <g transform="translate(128 330)" fill="white">
    <rect x="0" y="12" width="8" height="16" rx="4"/>
    <rect x="18" y="6" width="8" height="28" rx="4" opacity="0.9"/>
    <rect x="36" y="0" width="8" height="40" rx="4" opacity="0.7"/>
    <rect x="54" y="8" width="8" height="24" rx="4"/>
    <rect x="72" y="12" width="8" height="16" rx="4" opacity="0.8"/>
    <rect x="90" y="4" width="8" height="32" rx="4"/>
    <rect x="108" y="10" width="8" height="20" rx="4" opacity="0.9"/>
    <rect x="126" y="2" width="8" height="36" rx="4"/>
    <rect x="144" y="12" width="8" height="16" rx="4" opacity="0.7"/>
    <rect x="162" y="8" width="8" height="24" rx="4"/>
    <rect x="180" y="14" width="8" height="12" rx="4" opacity="0.8"/>
    <rect x="198" y="6" width="8" height="28" rx="4"/>
    <rect x="216" y="0" width="8" height="40" rx="4"/>
    <rect x="234" y="10" width="8" height="20" rx="4" opacity="0.9"/>
    <rect x="252" y="12" width="8" height="16" rx="4"/>
  </g>
  <text x="256" y="460" font-family="Inter, sans-serif" font-weight="800" font-size="22" fill="white" text-anchor="middle" letter-spacing="1.5">ALEXA x MUSIC</text>
</svg>
